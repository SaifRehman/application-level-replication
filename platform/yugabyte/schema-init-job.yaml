apiVersion: batch/v1
kind: Job
metadata:
  name: yb-schema-init
  namespace: identity-db
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ysqlsh
          image: yugabytedb/yugabyte:2.21.1.0-b271
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              for i in {1..60}; do
                if ./bin/ysqlsh -h yugabyte-yb-tservers -p 5433 -U yugabyte -d yugabyte -c "SELECT 1" >/dev/null 2>&1; then
                  break
                fi
                echo "ysqlsh not ready (attempt $i/60), sleeping 5s"
                sleep 5
              done
              ./bin/ysqlsh -h yugabyte-yb-tservers -p 5433 -U yugabyte -d yugabyte <<'SQL'
              CREATE TABLE IF NOT EXISTS digital_identity (
                id          UUID PRIMARY KEY,
                full_name   TEXT NOT NULL,
                phone       TEXT NOT NULL DEFAULT '',
                address     TEXT NOT NULL DEFAULT '',
                email       TEXT NOT NULL DEFAULT '',
                passport_no TEXT NOT NULL DEFAULT '',
                created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
                updated_at  TIMESTAMPTZ NOT NULL DEFAULT now()
              );
              SQL
              echo "schema applied"
