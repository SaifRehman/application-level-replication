apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-frontend-config
data:
  config.js: |
    window.__CONFIG__ = {
      apiBase: "/api",
      apiKey: "demo-key-change-me",
      clusterName: "unknown"
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-frontend
  labels:
    app: identity
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
      component: frontend
  template:
    metadata:
      labels:
        app: identity
        component: frontend
        istio.io/dataplane-mode: none
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/identity-staging/identity-frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_HOST
              value: identity-backend
            - name: BACKEND_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
      volumes:
        - name: config
          configMap:
            name: identity-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: identity-frontend
  labels:
    app: identity
    component: frontend
spec:
  selector:
    app: identity
    component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
