apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-c2
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/saifrehman/application-level-replication
    targetRevision: main
    path: platform/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-staging-c2
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/saifrehman/application-level-replication
    targetRevision: main
    path: clusters/cluster-2/staging/identity
  destination:
    server: https://kubernetes.default.svc
    namespace: identity-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-mesh-c2
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/saifrehman/application-level-replication
    targetRevision: main
    path: clusters/cluster-2/staging/mesh
  destination:
    server: https://kubernetes.default.svc
    namespace: identity-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
