apiVersion: v1
kind: Service
metadata:
  name: yb-tservers-c1
  namespace: identity-db
spec:
  selector:
    app.kubernetes.io/name: yb-tserver
  ports:
    - name: rpc
      port: 9100
      targetPort: 9100
