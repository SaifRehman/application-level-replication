apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: identity-template
  namespace: cicd
spec:
  params:
    - name: git-url
    - name: git-revision
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: identity-ci-
        namespace: cicd
      spec:
        pipelineRef:
          name: identity-ci
        serviceAccountName: identity-pipeline
        params:
          - name: GIT_URL
            value: $(tt.params.git-url)
          - name: GIT_REVISION
            value: $(tt.params.git-revision)
          - name: BACKEND_IMAGE
            value: image-registry.openshift-image-registry.svc:5000/identity-staging/identity-backend:$(tt.params.git-revision)
          - name: FRONTEND_IMAGE
            value: image-registry.openshift-image-registry.svc:5000/identity-staging/identity-frontend:$(tt.params.git-revision)
          - name: SONAR_HOST_URL
            value: http://sonarqube.sonarqube.svc:9000
          - name: ARGOCD_URL_C1
            value: openshift-gitops-server.openshift-gitops.svc:443
          - name: ARGOCD_URL_C2
            value: openshift-gitops-server.openshift-gitops.svc:443
          - name: STAGING_TARGET_URL
            value: http://identity-frontend.identity-staging.svc:8080
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
                storageClassName: gp3-csi
