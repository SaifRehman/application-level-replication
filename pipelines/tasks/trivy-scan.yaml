apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-scan
  namespace: cicd
spec:
  params:
    - name: IMAGE
      type: string
  steps:
    - name: scan
      image: aquasec/trivy:0.55.0
      env:
        - name: HOME
          value: /tekton/home
        - name: TRIVY_CACHE_DIR
          value: /tekton/home/.cache/trivy
        - name: TRIVY_INSECURE
          value: "true"
        - name: TRIVY_USERNAME
          value: serviceaccount
      script: |
        #!/bin/sh
        set -e
        TRIVY_PASSWORD=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        export TRIVY_PASSWORD
        trivy image \
          --exit-code 0 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --no-progress \
          $(params.IMAGE)
