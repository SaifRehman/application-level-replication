apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: zap-baseline
  namespace: cicd
spec:
  params:
    - name: TARGET
      type: string
  steps:
    - name: scan
      image: ghcr.io/zaproxy/zaproxy:stable
      env:
        - name: HOME
          value: /tekton/home
      script: |
        #!/bin/bash
        set +e
        cd /tekton/home
        zap-baseline.py -t $(params.TARGET) -I -m 1 -d
        rc=$?
        if [ $rc -le 2 ]; then
          echo "ZAP baseline finished (rc=$rc, treating <=2 as pass for demo)"
          exit 0
        fi
        echo "ZAP baseline reported errors (rc=$rc)"
        exit $rc
