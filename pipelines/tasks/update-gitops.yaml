apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-gitops
  namespace: cicd
spec:
  params:
    - name: BACKEND_IMAGE
      type: string
    - name: FRONTEND_IMAGE
      type: string
    - name: GIT_URL
      type: string
    - name: GIT_BRANCH
      type: string
      default: main
    - name: GIT_USER_EMAIL
      type: string
      default: ci@identity.demo
    - name: GIT_USER_NAME
      type: string
      default: identity-ci
  steps:
    - name: bump
      image: alpine/git:2.45.2
      env:
        - name: HOME
          value: /tekton/home
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-push-token
              key: token
              optional: true
      script: |
        #!/bin/sh
        set -e

        wget -q -O /tekton/home/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
        chmod +x /tekton/home/yq
        YQ=/tekton/home/yq

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "GH_TOKEN missing — set Secret 'github-push-token' in cicd ns; skipping push"
          exit 0
        fi

        AUTHED_URL=$(echo "$(params.GIT_URL)" | sed "s#https://#https://${GH_TOKEN}@#")
        cd /tekton/home
        rm -rf repo
        git clone --depth 1 -b $(params.GIT_BRANCH) "$AUTHED_URL" repo
        cd repo

        BACKEND_FULL="$(params.BACKEND_IMAGE)"
        BACKEND_NAME="${BACKEND_FULL%:*}"
        BACKEND_TAG="${BACKEND_FULL##*:}"
        FRONTEND_FULL="$(params.FRONTEND_IMAGE)"
        FRONTEND_NAME="${FRONTEND_FULL%:*}"
        FRONTEND_TAG="${FRONTEND_FULL##*:}"

        for cluster in cluster-1 cluster-2; do
          file="clusters/${cluster}/staging/identity/kustomization.yaml"
          BACKEND_NAME="$BACKEND_NAME"   BACKEND_TAG="$BACKEND_TAG" \
            $YQ -i '(.images[] | select(.name | test("identity-backend$"))).newName = strenv(BACKEND_NAME) | (.images[] | select(.name | test("identity-backend$"))).newTag = strenv(BACKEND_TAG)' "$file"
          FRONTEND_NAME="$FRONTEND_NAME" FRONTEND_TAG="$FRONTEND_TAG" \
            $YQ -i '(.images[] | select(.name | test("identity-frontend$"))).newName = strenv(FRONTEND_NAME) | (.images[] | select(.name | test("identity-frontend$"))).newTag = strenv(FRONTEND_TAG)' "$file"
        done

        git config user.email "$(params.GIT_USER_EMAIL)"
        git config user.name "$(params.GIT_USER_NAME)"
        git add clusters

        if git diff --cached --quiet; then
          echo "no manifest changes; nothing to push"
          exit 0
        fi

        git commit -m "ci: bump images to ${BACKEND_TAG}/${FRONTEND_TAG}"
        git push origin HEAD:$(params.GIT_BRANCH)
        echo "pushed image-tag bump to $(params.GIT_BRANCH)"
