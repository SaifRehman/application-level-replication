apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: go-test
  namespace: cicd
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: golang:1.25
      workingDir: $(workspaces.source.path)/backend
      env:
        - name: HOME
          value: /tekton/home
        - name: GOCACHE
          value: /tekton/home/go-build
        - name: GOMODCACHE
          value: /tekton/home/go-mod
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        go test ./... -coverprofile=cover.out -covermode=atomic
        go vet ./...
        go tool cover -func=cover.out | tail -3
