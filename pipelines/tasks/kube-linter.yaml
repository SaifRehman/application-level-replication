apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kube-linter
  namespace: cicd
spec:
  workspaces:
    - name: source
  steps:
    - name: lint
      image: stackrox/kube-linter:latest-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        /kube-linter lint platform pipelines clusters || true
