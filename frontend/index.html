<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Identity</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Digital Identity</h1>
    <span id="cluster-badge" class="badge"></span>
  </header>

  <main>
    <section class="card">
      <h2 id="form-title">New identity</h2>
      <form id="identity-form" autocomplete="off">
        <input type="hidden" name="id" />
        <label>Full name<input name="full_name" required /></label>
        <label>Phone<input name="phone" /></label>
        <label>Address<input name="address" /></label>
        <label>Email<input name="email" type="email" /></label>
        <label>Passport no.<input name="passport_no" /></label>
        <div class="actions">
          <button type="submit">Save</button>
          <button type="button" id="cancel-edit" hidden>Cancel</button>
        </div>
        <p id="form-error" class="error" role="alert"></p>
      </form>
    </section>

    <section class="card">
      <div class="row">
        <h2>Existing identities</h2>
        <button type="button" id="refresh">Refresh</button>
      </div>
      <table id="identities">
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Phone</th><th>Passport</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
